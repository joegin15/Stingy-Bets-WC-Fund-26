<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stingy Bets — World Cup Fund '26</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#111318; --surface:#1a1d23; --surf2:#22252d;
  --border:rgba(255,255,255,0.08); --bord2:rgba(255,255,255,0.14);
  --text:#fff; --text2:#8a8f9c; --text3:#50545f;
  --green:#00c805; --green2:rgba(0,200,5,0.12);
  --red:#f45531; --red2:rgba(244,85,49,0.12);
  --gold:#c9a830; --gold2:rgba(201,168,48,0.14);
}
html { -webkit-text-size-adjust: 100%; }
body {
  font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; -webkit-font-smoothing:antialiased;
}

/* NAV */
.nav {
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:0 20px; min-height:52px;
  border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:100;
}
.brand { font-size:12px; font-weight:600; letter-spacing:0.06em; color:var(--text2); text-transform:uppercase; }
.brand em { color:var(--green); font-style:normal; }
.nav-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
.live-pill { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text3); white-space:nowrap; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; flex-shrink:0; }
.live-dot.stale { background:var(--text3); animation:none; }
.live-dot.error { background:var(--red); animation:none; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.25;} }
.refresh-btn {
  background:var(--surf2); border:1px solid var(--border); color:var(--text2);
  font-size:11px; font-family:inherit; padding:6px 12px; border-radius:6px; cursor:pointer;
}
.refresh-btn:hover { color:var(--text); border-color:var(--bord2); }
.refresh-btn:active { transform:scale(.97); }

.container { max-width:680px; margin:0 auto; padding:0 20px 64px; }

/* HEADLINE: OPEN POSITIONS */
.head { padding:32px 0 26px; border-bottom:1px solid var(--border); margin-bottom:26px; }
.head-label { font-size:13px; color:var(--text2); margin-bottom:8px; }
.head-value { font-size:40px; font-weight:700; letter-spacing:-0.03em; line-height:1; }
.head-delta { font-size:14px; font-weight:500; margin-top:10px; }
.head-delta.up { color:var(--green); }
.head-delta.down { color:var(--red); }
.head-delta .muted { color:var(--text3); font-weight:400; margin-left:6px; }

/* SECTION TITLES */
.sec-title {
  font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--text2); margin:0 0 14px; display:flex; align-items:center; gap:8px;
}
.sec-count { font-size:11px; color:var(--text3); background:var(--surf2); border-radius:20px; padding:1px 9px; }
.section { margin-bottom:36px; }

/* POSITION ROWS */
.rows { display:flex; flex-direction:column; gap:8px; }
.row {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:14px 16px; display:flex; align-items:center; gap:12px;
  text-decoration:none; color:inherit; transition:border-color .15s;
}
.row:hover { border-color:var(--bord2); }
.row.won { border-left:3px solid var(--green); }
.row.lost { border-left:3px solid var(--red); }
.row-icon { width:36px; height:36px; border-radius:50%; background:var(--surf2); object-fit:cover; flex-shrink:0; }
.row-main { flex:1; min-width:0; }
.row-title { font-size:14px; font-weight:600; line-height:1.3; margin-bottom:6px; }
.row-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.row-right { flex-shrink:0; text-align:right; white-space:nowrap; }
.row-val { font-size:15px; font-weight:700; letter-spacing:-0.01em; }
.row-pnl { font-size:12px; font-weight:500; margin-top:3px; }
.row-pnl.up { color:var(--green); }
.row-pnl.down { color:var(--red); }
.row-detail { font-size:11px; color:var(--text3); margin-top:3px; }
.tag { font-size:11px; color:var(--text2); background:var(--surf2); border-radius:4px; padding:2px 7px; white-space:nowrap; }
.tag.yes { color:var(--green); background:var(--green2); }
.tag.no { color:var(--red); background:var(--red2); }
.row-sub { font-size:11px; color:var(--text3); }

/* HISTORY ROWS */
.h-row {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:13px 16px; display:flex; align-items:center; gap:12px; justify-content:space-between;
}
.h-left { min-width:0; }
.h-title { font-size:13px; font-weight:500; line-height:1.35; }
.h-side { font-size:10px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; border-radius:4px; padding:2px 7px; margin-right:8px; }
.h-side.buy { background:var(--green2); color:var(--green); }
.h-side.sell { background:var(--red2); color:var(--red); }
.h-side.redeem { background:var(--gold2); color:var(--gold); }
.h-sub { margin-top:6px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.h-right { flex-shrink:0; text-align:right; }
.h-amt { font-size:14px; font-weight:600; white-space:nowrap; }

/* STATES */
.state { text-align:center; padding:40px 0; color:var(--text3); font-size:13px; }
.skeleton { background:var(--surface); border:1px solid var(--border); border-radius:12px; height:64px; margin-bottom:8px; position:relative; overflow:hidden; }
.skeleton::after { content:""; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent); animation:shimmer 1.4s infinite; }
@keyframes shimmer { 100%{transform:translateX(100%);} }

.addr { font-size:11px; color:var(--text3); margin-top:8px; }
.addr a { color:var(--text2); text-decoration:none; }
.addr a:hover { color:var(--green); }
.footer { text-align:center; padding:24px 20px; font-size:11px; color:var(--text3); border-top:1px solid var(--border); }
.footer a { color:var(--text2); text-decoration:none; }
.footer a:hover { color:var(--text); }

/* MOBILE */
@media (max-width:560px) {
  .nav { padding:0 14px; }
  .brand { font-size:10px; letter-spacing:0.04em; }
  .live-pill span { display:none; }
  .container { padding:0 14px 56px; }
  .head { padding:26px 0 22px; }
  .head-value { font-size:34px; }
  .row { padding:12px 14px; gap:10px; }
  .row-icon { width:32px; height:32px; }
  .row-title { font-size:13px; }
  .row-val { font-size:14px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="brand"><em>Stingy</em> Bets — WC Fund '26</div>
  <div class="nav-right">
    <div class="live-pill"><div class="live-dot" id="liveDot"></div><span id="liveText">Connecting…</span></div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">Refresh</button>
  </div>
</nav>

<div class="container">

  <!-- HEADLINE -->
  <div class="head">
    <div class="head-label">Open positions</div>
    <div class="head-value" id="posValue">$—</div>
  </div>

  <!-- POSITIONS -->
  <div class="section">
    <div class="sec-title">Positions <span class="sec-count" id="cntPositions">0</span></div>
    <div class="rows" id="positionsList"><div class="skeleton"></div></div>
  </div>

  <!-- HISTORY -->
  <div class="section">
    <div class="sec-title">History <span class="sec-count" id="cntHistory">0</span></div>
    <div class="rows" id="historyList"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="addr" id="addrLine"></div>
  </div>

</div>

<div class="footer">
  Stingy Bets · World Cup Fund '26 · Live from <a href="https://polymarket.com" target="_blank" rel="noopener">Polymarket</a><br>
  For entertainment only. Please gamble responsibly.
</div>

<script>
const WALLET = (new URLSearchParams(location.search).get('wallet')
  || '0xdDB394e13Da5c9Cf30416447E2DcE055329B5fE5').toLowerCase();
const DATA_API = 'https://data-api.polymarket.com';
const REFRESH_MS = 30000;
const HISTORY_FROM = Date.UTC(2026, 5, 1) / 1000;          // hide anything before 1 Jun 2026
const HIST_TYPES = ['TRADE', 'REDEEM', 'MERGE', 'SPLIT'];
const inHistory = a => HIST_TYPES.includes(a.type) && (a.timestamp || 0) >= HISTORY_FROM;

const $ = id => document.getElementById(id);
const usd = n => '$' + (n < 0 ? '-' : '') + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const cents = p => Math.round(p * 100) + '¢';
const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const outClass = o => { const x=(o||'').toLowerCase(); return x==='yes'?'yes':(x==='no'?'no':''); };

function setLive(state, text){ $('liveDot').className='live-dot'+(state==='ok'?'':' '+state); $('liveText').textContent=text; }
async function fetchJSON(url){ const r=await fetch(url,{headers:{'Accept':'application/json'}}); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }

function renderPositions(positions){
  const list=$('positionsList');
  if(!positions.length){ list.innerHTML='<div class="state">No open positions right now.</div>'; return; }
  positions.sort((a,b)=>(b.currentValue||0)-(a.currentValue||0));
  list.innerHTML=positions.map(p=>{
    const pnl=p.cashPnl||0, up=pnl>=0;
    const url=p.eventSlug?('https://polymarket.com/event/'+p.eventSlug):'https://polymarket.com';
    const icon=p.icon?`<img class="row-icon" src="${p.icon}" alt="">`:'<div class="row-icon"></div>';
    return `<a class="row ${up?'won':'lost'}" href="${url}" target="_blank" rel="noopener">
      ${icon}
      <div class="row-main">
        <div class="row-title">${esc(p.title||'Market')}</div>
        <div class="row-meta">
          <span class="tag ${outClass(p.outcome)}">${esc(p.outcome||'')}</span>
          <span class="row-sub">${cents(p.avgPrice)} → ${cents(p.curPrice)}</span>
          <span class="row-sub">· ${Math.round(p.size)} shares</span>
        </div>
      </div>
      <div class="row-right">
        <div class="row-val">${usd(p.currentValue||0)}</div>
        <div class="row-pnl ${up?'up':'down'}">${up?'+':''}${usd(pnl)} (${(p.percentPnl>=0?'+':'')+(p.percentPnl||0).toFixed(1)}%)</div>
        <div class="row-detail">in ${usd(p.initialValue||0)}</div>
      </div>
    </a>`;
  }).join('');
}

function renderHistory(activity){
  const list=$('historyList');
  const items=activity.filter(inHistory);
  if(!items.length){ list.innerHTML='<div class="state">No activity yet.</div>'; return; }
  list.innerHTML=items.map(a=>{
    let sideClass='buy', sideLabel=a.side||a.type;
    if(a.type==='REDEEM'){ sideClass='redeem'; sideLabel='Redeem'; }
    else if(a.side==='SELL'){ sideClass='sell'; sideLabel='Sell'; }
    else if(a.side==='BUY'){ sideClass='buy'; sideLabel='Buy'; }
    return `<div class="h-row">
      <div class="h-left">
        <div class="h-title"><span class="h-side ${sideClass}">${sideLabel}</span>${esc(a.title||'Market')}</div>
      </div>
      <div class="h-right">${a.outcome?`<span class="tag ${outClass(a.outcome)}">${esc(a.outcome)}</span>`:''}</div>
    </div>`;
  }).join('');
}

let loading=false;
async function loadAll(){
  if(loading) return; loading=true;
  $('refreshBtn').textContent='…'; setLive('stale','Updating…');
  try{
    const [positions, activity] = await Promise.all([
      fetchJSON(`${DATA_API}/positions?user=${WALLET}`).catch(()=>[]),
      fetchJSON(`${DATA_API}/activity?user=${WALLET}&limit=100`).catch(()=>[])
    ]);
    const posValue=positions.reduce((s,p)=>s+(p.currentValue||0),0);
    const cost=positions.reduce((s,p)=>s+(p.initialValue||0),0);
    const pnl=positions.reduce((s,p)=>s+(p.cashPnl||0),0);

    $('posValue').textContent=usd(posValue);
    $('cntPositions').textContent=positions.length;
    $('cntHistory').textContent=activity.filter(inHistory).length;
    renderPositions(positions);
    renderHistory(activity);
    $('addrLine').innerHTML=`Wallet <a href="https://polymarket.com/profile/${WALLET}" target="_blank" rel="noopener">${WALLET.slice(0,6)}…${WALLET.slice(-4)}</a>`;
    setLive('ok','Live · '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    setLive('error','Connection error');
    $('positionsList').innerHTML='<div class="state">Couldn’t reach Polymarket. Retrying…</div>';
  }finally{
    loading=false; $('refreshBtn').textContent='Refresh';
  }
}

loadAll();
setInterval(loadAll, REFRESH_MS);
</script>
</body>
</html>
